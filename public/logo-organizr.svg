<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="25" flood-color="#1D4ED8" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Fond transparent absolu -->
  <rect width="512" height="512" fill="transparent"/>
  
  <!-- Carré arrondi premium -->
  <rect x="56" y="56" width="400" height="400" rx="100" fill="url(#blueGradient)" filter="url(#shadow)"/>
  
  <!-- Lettre S -->
  <text x="50%" y="52%" dominant-baseline="central" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-style="italic" font-size="240" fill="white" letter-spacing="-10">S</text>
</svg>
