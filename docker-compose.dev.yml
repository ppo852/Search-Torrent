services:
  backend:
    image: node:20-alpine
    container_name: search-torrent-backend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev:backend"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - JWT_SECRET=change_this_to_a_secure_secret
    ports:
      - "3001:3001"
    volumes:
      - ./:/app
      - backend_node_modules:/app/node_modules
      - ./data:/app/data
      - D:/Desktop/projet/dd-docker/mydia/media/qbitorrent1/downloads:/media

  frontend:
    image: node:20-alpine
    container_name: search-torrent-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev:frontend -- --host 0.0.0.0 --port 5173"
    environment:
      - NODE_ENV=development
      - VITE_PROXY_TARGET=http://backend:3001
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  backend_node_modules:
  frontend_node_modules:
